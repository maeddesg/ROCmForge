[package]
name = "rocmforge"
version = "0.1.0"
edition = "2021"
description = "AMD-first LLM inference engine for Qwen2.5"

[dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bin]]
name = "cpu_gemv"
path = "src/bench_gemv.rs"

[[bin]]
name = "simple_bench"
path = "src/bench_simple.rs"

[[bench]]
name = "cpu_gemv"
harness = false
