[package]
name = "rocmforge"
version = "0.1.0"
edition = "2021"
description = "AMD-first LLM inference engine for Qwen2.5"

[dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[dev-dependencies]
# GGUF loading
memmap2 = "0.9"
half = "2"
# Tokenizer
regex = "1"
once_cell = "1"
# Error handling
thiserror = "2"
criterion = "0.5"
# Parallelism
rayon = "1"

[dev-dependencies]

[[bin]]
name = "bench_gemv"
path = "src/bench_gemv.rs"

[[bench]]
name = "cpu_gemv"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
