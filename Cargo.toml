[package]
name = "rocmforge"
version = "0.1.0"
edition = "2021"
description = "AMD-first LLM inference engine for Qwen2.5"

[dependencies]
# GGUF loading
memmap2 = "0.9"
half = "2"
# Tokenizer
regex = "1"
once_cell = "1"
# Error handling
thiserror = "2"
# Parallelism
rayon = "1"
# Hardware detection
sysinfo = "0.38"
# FFI
libc = "0.2"
# Compile HIP kernels
cc = "1.0"
# Timestamp generation
chrono = "0.4"
# JSON parsing
serde_json = "1"

[features]
default = []
# GPU support requires ROCm/HIP installation
gpu = []

[dev-dependencies]
fastrand = "2"
serial_test = "3"
criterion = "0.5"
clap = { version = "4.5", features = ["derive"] }

[[bin]]
name = "rocmforge"
path = "src/main.rs"

[[bin]]
name = "bench_gemv"
path = "src/bench_gemv.rs"

[[bench]]
name = "kernels"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
