[package]
name = "rocmforge"
version = "0.1.0"
edition = "2021"
description = "AMD-first LLM inference engine for Qwen2.5"

[dependencies]
# GGUF loading
memmap2 = "0.9"
half = "2"
# Tokenizer
regex = "1"
once_cell = "1"
# Error handling
thiserror = "2"
# Parallelism
rayon = "1"
# Hardware detection
sysinfo = "0.38"

[dev-dependencies]

[[bin]]
name = "rocmforge"
path = "src/main.rs"

[[bin]]
name = "bench_gemv"
path = "src/bench_gemv.rs"

[profile.release]
opt-level = 3
lto = "thin"
